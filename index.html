<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>알린더</title>

<style>

body{
font-family:-apple-system;
background:#f5f5f7;
text-align:center;
margin:0;
}

h1{
margin-top:30px;
}

.month-bar{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:10px;
}

#monthText{
font-size:28px;
font-weight:bold;
}

.arrow{
cursor:pointer;
font-size:32px;
font-weight:bold;
width:40px;
text-align:center;
}

.arrow.disabled{
opacity:0.3;
cursor:default;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
max-width:400px;
margin:20px auto;
padding:10px;
}

.day{
background:white;
padding:10px;
border-radius:15px;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
font-weight:bold;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:55px;
}

.day-number{
font-size:16px;
}

.dot{
width:6px;
height:6px;
background:black;
border-radius:50%;
margin-top:4px;
}

#alarmInput{
margin-top:20px;
}

input{
padding:10px;
margin:5px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:black;
color:white;
cursor:pointer;
}

.alarm{
background:white;
padding:10px;
margin:8px auto;
max-width:300px;
border-radius:12px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
display:flex;
justify-content:space-between;
align-items:center;
}

#alarmScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

#alarmScreen button{
font-size:20px;
padding:15px 20px;
margin:10px;
}

</style>

</head>

<body>

<h1>알린더</h1>

<div class="month-bar">

<div id="prev" class="arrow">&lt;</div>

<div id="monthText">4월</div>

<div id="next" class="arrow">&gt;</div>

</div>

<div class="calendar" id="calendar"></div>

<h2 id="selectedDate">날짜를 선택하세요</h2>

<div id="alarmInput">

<input type="time" id="alarmTime">

<input type="text" id="alarmTitle" placeholder="알람 이름">

<button onclick="addAlarm()">추가</button>

</div>

<div id="alarmList"></div>

<div id="alarmScreen">

<h1 id="alarmTitleText"></h1>

<button onclick="stopAlarm()">알람 중지</button>

<button onclick="snoozeAlarm()">스누즈</button>

</div>

<script>

let currentDay=null
let currentMonth=4

let triggered={}
let snoozeCount={}

let currentAlarmKey=null

let alarmSound=new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg")
alarmSound.loop=true

let stopTimer=null

function getData(){
return JSON.parse(localStorage.getItem("alinder")||"{}")
}

function saveData(data){
localStorage.setItem("alinder",JSON.stringify(data))
}

function createCalendar(){

let calendar=document.getElementById("calendar")

calendar.innerHTML=""

let days=new Date(2026,currentMonth,0).getDate()

for(let i=1;i<=days;i++){

let day=document.createElement("div")
day.className="day"
day.onclick=function(){selectDay(i)}

let number=document.createElement("div")
number.className="day-number"
number.innerText=i

day.appendChild(number)

calendar.appendChild(day)

}

updateCalendarDots()

}

function selectDay(day){

currentDay=day

document.getElementById("selectedDate").innerText=currentMonth+"월 "+day+"일"

renderAlarms()

}

function addAlarm(){

if(!currentDay){
alert("날짜를 먼저 선택하세요")
return
}

let time=document.getElementById("alarmTime").value
let title=document.getElementById("alarmTitle").value

if(time===""){
alert("시간을 입력하세요")
return
}

let data=getData()

let key=currentMonth+"-"+currentDay

if(!data[key]) data[key]=[]

data[key].push({time:time,title:title||"알람"})

saveData(data)

renderAlarms()

updateCalendarDots()

}

function deleteAlarm(index){

let data=getData()

let key=currentMonth+"-"+currentDay

data[key].splice(index,1)

saveData(data)

renderAlarms()

updateCalendarDots()

}

function renderAlarms(){

let list=document.getElementById("alarmList")

list.innerHTML=""

let data=getData()

let key=currentMonth+"-"+currentDay

let alarms=data[key]||[]

alarms.sort((a,b)=>a.time.localeCompare(b.time))

alarms.forEach((a,index)=>{

let alarm=document.createElement("div")

alarm.className="alarm"

alarm.innerHTML="<span>"+a.time+" "+a.title+"</span><button onclick='deleteAlarm("+index+")'>삭제</button>"

list.appendChild(alarm)

})

}

function updateCalendarDots(){

let data=getData()

let days=document.querySelectorAll(".day")

days.forEach(day=>{

let number=day.querySelector(".day-number").innerText

let key=currentMonth+"-"+number

let oldDot=day.querySelector(".dot")

if(oldDot) oldDot.remove()

if(data[key] && data[key].length>0){

let dot=document.createElement("div")
dot.className="dot"
day.appendChild(dot)

}

})

}

function startAlarm(title,key){

currentAlarmKey=key

document.getElementById("alarmTitleText").innerText=title

document.getElementById("alarmScreen").style.display="flex"

alarmSound.currentTime=0
alarmSound.play()

stopTimer=setTimeout(()=>{
stopAlarm()
},300000)

}

function stopAlarm(){

alarmSound.pause()

document.getElementById("alarmScreen").style.display="none"

}

function snoozeAlarm(){

let key=currentAlarmKey

if(!snoozeCount[key]) snoozeCount[key]=0

if(snoozeCount[key]>=2){
stopAlarm()
return
}

snoozeCount[key]++

let now=new Date()

now.setMinutes(now.getMinutes()+10)

let h=String(now.getHours()).padStart(2,"0")
let m=String(now.getMinutes()).padStart(2,"0")

let newTime=h+":"+m

let data=getData()

let todayKey=currentMonth+"-"+now.getDate()

if(!data[todayKey]) data[todayKey]=[]

data[todayKey].push({time:newTime,title:"스누즈 알람"})

saveData(data)

stopAlarm()

}

function checkAlarms(){

let now=new Date()

let h=String(now.getHours()).padStart(2,"0")
let m=String(now.getMinutes()).padStart(2,"0")
let s=now.getSeconds()

if(s!==0) return

let currentTime=h+":"+m

let today=now.getDate()

let data=getData()

let key=currentMonth+"-"+today

if(!data[key]) return

data[key].forEach(a=>{

let alarmKey=key+"-"+a.time+"-"+a.title

if(a.time===currentTime && !triggered[alarmKey]){

triggered[alarmKey]=true

startAlarm(a.title,alarmKey)

}

})

}

setInterval(checkAlarms,500)

function updateMonthUI(){

document.getElementById("monthText").innerText=currentMonth+"월"

let prev=document.getElementById("prev")
let next=document.getElementById("next")

prev.classList.remove("disabled")
next.classList.remove("disabled")

if(currentMonth===4) prev.classList.add("disabled")
if(currentMonth===7) next.classList.add("disabled")

createCalendar()

}

document.getElementById("prev").onclick=function(){

if(currentMonth===4) return

currentMonth--

updateMonthUI()

}

document.getElementById("next").onclick=function(){

if(currentMonth===7) return

currentMonth++

updateMonthUI()

}

updateMonthUI()

</script>

</body>

</html>
